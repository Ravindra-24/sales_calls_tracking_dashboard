  <text x="78" y="368" fill="#d9e8ef" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600">Sales call tracking SaaS for Android teams</text>
  <text x="78" y="430" fill="#a9bbc5" font-family="Inter, Arial, sans-serif" font-size="25">Sync calls, monitor team performance, manage tenants,</text>
  <text x="78" y="466" fill="#a9bbc5" font-family="Inter, Arial, sans-serif" font-size="25">and share your mobile APK from one secure dashboard.</text>
