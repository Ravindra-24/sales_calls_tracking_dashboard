    <path d="M111 153c77-82 214-108 369-93 203 20 357 139 428 318 61 154 40 345-48 480 95-88 151-215 151-355 0-276-224-500-500-500-160 0-303 75-400 150Z" fill="#ffffff" opacity="0.1"/>
