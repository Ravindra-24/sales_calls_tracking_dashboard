<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LeadWatch - Sales Call Tracking SaaS</title>
  <desc id="desc">A social preview card for LeadWatch showing the app icon and sales call analytics dashboard.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#160b2d"/>
      <stop offset="1" stop-color="#061b1c"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="116" y1="72" x2="908" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a335ff"/>
      <stop offset="0.47" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#43158f"/>
    </linearGradient>
    <linearGradient id="iconBar" x1="0" y1="394" x2="0" y2="826" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9fe7ff"/>
      <stop offset="0.62" stop-color="#47bfff"/>
      <stop offset="1" stop-color="#2a7cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#47bfff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
