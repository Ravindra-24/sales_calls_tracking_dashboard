<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#6d28d9" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="10" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="lightShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect width="1024" height="1024" rx="280" fill="url(#bgGrad)" />

  <!-- Background Bars -->
  <!-- Bar 1 -->
  <rect x="520" y="580" width="80" height="200" rx="15" fill="url(#barGrad)" />
  <!-- Bar 2 -->
  <rect x="630" y="470" width="80" height="310" rx="15" fill="url(#barGrad)" />
  <!-- Bar 3 -->
  <rect x="740" y="510" width="80" height="270" rx="15" fill="url(#barGrad)" />

  <!-- Phone to Arrow Graphic (Group with shadow) -->
  <g filter="url(#shadow)">
    <path fill="#ffffff" d="M 233,403 
             C 253,303 393,293 423,373 
             C 433,403 373,433 343,483 
             C 323,533 393,653 473,733 
             C 543,803 663,773 663,683 
             C 663,633 603,583 583,553 
             C 553,513 543,473 623,433 
             L 693,373
             L 643,303 
             L 823,283 
             L 813,443 
             L 743,353 
             C 633,463 603,593 693,653 
             C 743,683 753,793 653,843 
             C 513,903 333,763 233,603 
             C 173,493 213,453 233,403 Z" />
  </g>
</svg>